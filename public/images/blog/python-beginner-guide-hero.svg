  <text x="100" y="162" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">環境構築</text>
  <text x="170" y="145" font-family="Arial, sans-serif" font-size="24" fill="#3B82F6" text-anchor="middle">→</text>
  <rect x="190" y="110" width="120" height="60" rx="8" fill="#3B82F6"/>
  <text x="250" y="145" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">STEP2</text>
  <text x="250" y="162" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">基本文法</text>
  <text x="320" y="145" font-family="Arial, sans-serif" font-size="24" fill="#3B82F6" text-anchor="middle">→</text>
  <rect x="340" y="110" width="120" height="60" rx="8" fill="#1D4ED8"/>
  <text x="400" y="145" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">STEP3</text>
  <text x="400" y="162" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">ミニPJ作成</text>
  <text x="470" y="145" font-family="Arial, sans-serif" font-size="24" fill="#3B82F6" text-anchor="middle">→</text>
  <rect x="490" y="110" width="120" height="60" rx="8" fill="#1D4ED8"/>
  <text x="550" y="145" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">STEP4</text>
  <text x="550" y="162" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">専門分野</text>
  <text x="620" y="145" font-family="Arial, sans-serif" font-size="24" fill="#F59E0B" text-anchor="middle">→</text>
  <rect x="640" y="110" width="120" height="60" rx="8" fill="#F59E0B"/>
  <text x="700" y="145" font-family="Arial, sans-serif" font-size="14" fill="#0F172A" text-anchor="middle">STEP5</text>
  <text x="700" y="162" font-family="Arial, sans-serif" font-size="12" fill="#0F172A" text-anchor="middle">PF公開</text>
