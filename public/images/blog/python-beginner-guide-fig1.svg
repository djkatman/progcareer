<svg xmlns="http://www.w3.org/2000/svg" width="600" height="350" viewBox="0 0 600 350">
  <rect width="600" height="350" fill="#F8FAFC"/>
  <text x="300" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0F172A" text-anchor="middle">Pythonプロジェクト学習フロー</text>
  <!-- Flow boxes -->
  <rect x="220" y="60" width="160" height="50" rx="6" fill="#3B82F6"/>
  <text x="300" y="91" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">テーマを決める</text>
  <line x1="300" y1="110" x2="300" y2="135" stroke="#3B82F6" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="220" y="135" width="160" height="50" rx="6" fill="#1D4ED8"/>
  <text x="300" y="166" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">設計・仕様を書く</text>
  <line x1="300" y1="185" x2="300" y2="210" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="294,208 306,208 300,218" fill="#3B82F6"/>
  <rect x="220" y="210" width="160" height="50" rx="6" fill="#1D4ED8"/>
  <text x="300" y="241" font-family="Arial, sans-serif" font-size="14" fill="#fff" text-anchor="middle">コーディング</text>
  <line x1="300" y1="260" x2="300" y2="285" stroke="#3B82F6" stroke-width="2"/>
  <polygon points="294,283 306,283 300,293" fill="#3B82F6"/>
  <rect x="220" y="285" width="160" height="50" rx="6" fill="#F59E0B"/>
  <text x="300" y="316" font-family="Arial, sans-serif" font-size="14" fill="#0F172A" text-anchor="middle">GitHub公開</text>
  <!-- Tips -->
  <rect x="30" y="135" width="160" height="50" rx="6" fill="#fff" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="110" y="156" font-family="Arial, sans-serif" font-size="12" fill="#3B82F6" text-anchor="middle">最初は100〜200行でOK</text>
  <text x="110" y="174" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">完璧主義を手放す</text>
  <line x1="190" y1="160" x2="220" y2="160" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4"/>
  <rect x="410" y="210" width="160" height="50" rx="6" fill="#fff" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="490" y="231" font-family="Arial, sans-serif" font-size="12" fill="#B45309" text-anchor="middle">エラーはGoogle検索</text>
  <text x="490" y="249" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">ChatGPTも活用OK</text>
  <line x1="380" y1="235" x2="410" y2="235" stroke="#94A3B8" stroke-width="1" stroke-dasharray="4"/>
</svg>
