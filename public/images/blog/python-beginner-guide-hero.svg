<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#EFF6FF"/>
  <rect x="0" y="0" width="800" height="6" fill="#3B82F6"/>
  <text x="40" y="80" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#0F172A">Python入門 最速5ステップ</text>
