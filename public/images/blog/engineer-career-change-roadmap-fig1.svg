<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360">
  <rect width="700" height="360" fill="#F8FAFC" rx="12"/>
  <text x="350" y="40" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#0F172A" text-anchor="middle">未経験エンジニア転職 ロードマップ</text>

  <!-- STEP 1 -->
  <rect x="30" y="70" width="120" height="60" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="90" y="97" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="700">STEP 1</text>
  <text x="90" y="115" font-family="Arial, sans-serif" font-size="12" fill="#0F172A" text-anchor="middle">目標職種を決める</text>

  <!-- 矢印 -->
  <line x1="150" y1="100" x2="178" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 2 -->
  <rect x="180" y="70" width="120" height="60" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="240" y="97" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="700">STEP 2</text>
  <text x="240" y="115" font-family="Arial, sans-serif" font-size="12" fill="#0F172A" text-anchor="middle">学習方法を選ぶ</text>

  <!-- 矢印 -->
  <line x1="300" y1="100" x2="328" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 3 -->
  <rect x="330" y="70" width="120" height="60" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="390" y="97" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="700">STEP 3</text>
  <text x="390" y="115" font-family="Arial, sans-serif" font-size="12" fill="#0F172A" text-anchor="middle">スクール受講</text>

  <!-- 矢印 -->
  <line x1="450" y1="100" x2="478" y2="100" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 4 -->
  <rect x="480" y="70" width="120" height="60" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="540" y="97" font-family="Arial, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="700">STEP 4</text>
  <text x="540" y="115" font-family="Arial, sans-serif" font-size="12" fill="#0F172A" text-anchor="middle">ポートフォリオ作成</text>

  <!-- 下矢印 STEP4→5 -->
  <line x1="540" y1="130" x2="540" y2="178" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- STEP 5 -->
  <rect x="480" y="180" width="120" height="60" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="540" y="207" font-family="Arial, sans-serif" font-size="11" fill="#D97706" text-anchor="middle" font-weight="700">STEP 5</text>
  <text x="540" y="225" font-family="Arial, sans-serif" font-size="12" fill="#0F172A" text-anchor="middle">転職活動開始</text>

  <!-- 矢印 -->
  <line x1="480" y1="210" x2="452" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- STEP 6 -->
  <rect x="330" y="180" width="120" height="60" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="2"/>
  <text x="390" y="207" font-family="Arial, sans-serif" font-size="11" fill="#D97706" text-anchor="middle" font-weight="700">STEP 6</text>
  <text x="390" y="225" font-family="Arial, sans-serif" font-size="12" fill="#0F172A" text-anchor="middle">エージェント登録</text>

  <!-- 矢印 -->
  <line x1="330" y1="210" x2="302" y2="210" stroke="#94A3B8" stroke-width="2" marker-end="url(#arrow2)"/>

  <!-- STEP 7 ゴール -->
  <rect x="150" y="180" width="150" height="60" rx="8" fill="#0F172A" stroke="#F59E0B" stroke-width="2"/>
  <text x="225" y="204" font-family="Arial, sans-serif" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="700">GOAL</text>
  <text x="225" y="222" font-family="Arial, sans-serif" font-size="12" fill="#FFFFFF" text-anchor="middle">内定・エンジニアへ</text>
  <text x="225" y="238" font-family="Arial, sans-serif" font-size="10" fill="#94A3B8" text-anchor="middle">平均6〜9ヶ月</text>

  <!-- 期間ラベル -->
  <rect x="30" y="290" width="300" height="36" rx="6" fill="#EFF6FF"/>
  <text x="180" y="314" font-family="Arial, sans-serif" font-size="13" fill="#3B82F6" text-anchor="middle">スクール期間：3〜6ヶ月</text>
  <rect x="350" y="290" width="300" height="36" rx="6" fill="#FFFBEB"/>
  <text x="500" y="314" font-family="Arial, sans-serif" font-size="13" fill="#D97706" text-anchor="middle">転職活動：1〜3ヶ月</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94A3B8"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto">
      <path d="M8,0 L8,6 L0,3 z" fill="#94A3B8"/>
    </marker>
  </defs>
</svg>
