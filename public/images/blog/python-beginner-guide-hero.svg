  <text x="100" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">半日</text>
  <text x="250" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">2〜4週</text>
  <text x="400" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">1〜2週</text>
  <text x="550" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">1〜3ヶ月</text>
  <text x="700" y="198" font-family="Arial, sans-serif" font-size="11" fill="#64748B" text-anchor="middle">2〜4週</text>
  <!-- Use cases -->
  <rect x="40" y="240" width="220" height="80" rx="8" fill="#fff" stroke="#3B82F6" stroke-width="2"/>
  <text x="150" y="268" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">AI・データ分析</text>
  <text x="150" y="290" font-family="Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">pandas / scikit-learn</text>
  <text x="150" y="308" font-family="Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">TensorFlow</text>
  <rect x="290" y="240" width="220" height="80" rx="8" fill="#fff" stroke="#3B82F6" stroke-width="2"/>
  <text x="400" y="268" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1D4ED8" text-anchor="middle">Web開発</text>
  <text x="400" y="290" font-family="Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">Django / Flask</text>
  <text x="400" y="308" font-family="Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">FastAPI</text>
  <rect x="540" y="240" width="220" height="80" rx="8" fill="#fff" stroke="#F59E0B" stroke-width="2"/>
  <text x="650" y="268" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#B45309" text-anchor="middle">業務自動化</text>
  <text x="650" y="290" font-family="Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">openpyxl / Selenium</text>
  <text x="650" y="308" font-family="Arial, sans-serif" font-size="12" fill="#475569" text-anchor="middle">フリーランス活用</text>
  <text x="40" y="415" font-family="Arial, sans-serif" font-size="14" fill="#94A3B8">ProgCareer — progcareer.com</text>
